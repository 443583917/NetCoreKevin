server:
  port: 9901
  mode: release
  readTimeout: 30
  writeTimeout: 30

database:
  host: mysql
  port: 3306
  user: root
  password: admin123
  dbname: kevin_app
  maxIdleConns: 10
  maxOpenConns: 100

redis:
  host: redis
  port: 6379
  password: "123456"
  db: 0

jwt:
  secret: ${JWT_SECRET}
  expireHour: 24

ai:
  defaultProvider: openai
  providers:
    - name: openai
      apiKey: ${OPENAI_API_KEY}
      baseUrl: https://api.openai.com/v1
      model: gpt-4

rabbitmq:
  host: rabbitmq
  port: 5672
  user: guest
  password: guest
  vhost: /

log:
  level: info
  filename: logs/app.log
  maxSize: 100
  maxBackups: 7
  maxAge: 30
